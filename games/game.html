<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

document.getElementById("title").innerText = name || "Game";

/* GAME LIBRARY */
const games = {
  "Drive Mad": "https://www.crazygames.com/embed/drive-mad",
  "Retro Bowl": "https://www.crazygames.com/embed/retro-bowl",
  "2048": "https://play2048.co/",
  "Slope": "https://www.crazygames.com/embed/slope"
};

document.getElementById("frame").src = games[name] || "";

/* RECENTLY PLAYED (no UI change, just memory) */
if (name) {
  let recent = JSON.parse(localStorage.getItem("recentGames") || "[]");
  recent = [name, ...recent.filter(g => g !== name)].slice(0, 5);
  localStorage.setItem("recentGames", JSON.stringify(recent));
}
</script>
