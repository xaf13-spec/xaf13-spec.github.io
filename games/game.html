<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Game</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<header>
  <h1 id="gameTitle">Loading...</h1>
  <a href="../index.html" style="color:white;">⬅ Back</a>
</header>

<main style="text-align:center; padding:20px;">
  <iframe id="gameFrame" width="90%" height="500px"></iframe>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get("name");

  document.getElementById("gameTitle").innerText = name;

  // PLACEHOLDER (you replace links later)
  const games = {
    "Drive Mad": "https://www.crazygames.com/embed/drive-mad",
    "Retro Bowl": "https://www.crazygames.com/embed/retro-bowl",
    "2048": "https://play2048.co/",
    "Slope": "https://www.crazygames.com/embed/slope"
  };

  document.getElementById("gameFrame").src = games[name] || "";
</script>

</body>
</html>
