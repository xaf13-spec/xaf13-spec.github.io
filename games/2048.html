<!DOCTYPE html>
<html>
<head>
<title>2048</title>
</head>
<body>

<h1>2048</h1>

<button onclick="toggleFullscreen()">
Fullscreen
</button>

<iframe
id="gameFrame"
src="../html5-games/2048/index.html"
width="100%"
height="700"
frameborder="0">
</iframe>

<script>
function toggleFullscreen() {
  const frame = document.getElementById("gameFrame");

  if (!document.fullscreenElement) {
    frame.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
