<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Game Central</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111827;
    color:white;
}

header{
    background:#1f2937;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#3b82f6;
}

.search{
    padding:10px;
    width:250px;
    border:none;
    border-radius:8px;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:50px;
    margin-bottom:10px;
}

.hero p{
    color:#9ca3af;
}

.games{
    padding:30px;
}

.games h2{
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}

footer{
    text-align:center;
    padding:30px;
    color:#9ca3af;
}
</style>
</head>

<body>

<header>
    <div class="logo">MX Game Central</div>
    <input class="search" type="text" placeholder="Search games...">
</header>

<section class="hero">
    <h1>Play Free Games Online</h1>
    <p>Thousands of browser games. No downloads required.</p>
</section>

<section class="games">
    <h2>Popular Games</h2>

    <div class="grid">

        <div class="card">
            <img src="https://picsum.photos/400/250?1">
            <h3>Drive Mad</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/250?2">
            <h3>Retro Bowl</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/250?3">
            <h3>Basketball Stars</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/250?4">
            <h3>Slope</h3>
        </div>

    </div>
</section>

<footer>
    © 2026 MX Game Central
</footer>

</body>
</html>
